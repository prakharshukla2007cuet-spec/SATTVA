<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You!</title>
  <link rel="stylesheet" href="thank-you.css">
</head>
<body onload="playSound(); startConfetti();">

  <div class="container">
    <img src="logo 1.jpeg" alt="Sattva Logo" class="logo">
    <h1 id="thanks-message">Thank you for applying!</h1>
    <p id="follow-message">We will get back to you shortly.</p>

    <a href="https://whatsapp.com/channel/0029VagD4tl1XqugfLkfaZ0v" target="_blank" class="whatsapp-btn">
      📲 Follow up on WhatsApp
    </a>
    <a href="https://instagram.com/ns_sattva" target="_blank" class="instagram-btn">
  📷 Follow us on Instagram
</a>
  </div>

  <audio id="successSound" autoplay>
  <source src="successed-295058.mp3" type="audio/mpeg">
</audio>


  <!-- Confetti JS -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role'); // ?role=student or ?role=instructor

    if (role === 'student') {
      document.getElementById("thanks-message").innerText = "Thank you for joining as a Student!";
      document.getElementById("follow-message").innerText = "Our team will contact you with learning options soon.";
    } else if (role === 'instructor') {
      document.getElementById("thanks-message").innerText = "Thank you for applying as an Instructor!";
      document.getElementById("follow-message").innerText = "We'll review your profile and contact you.";
    }

    function playSound() {
      document.getElementById("successSound").play();
    }

    function startConfetti() {
      confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
      });
    }
  </script>
</body>
</html>
