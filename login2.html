<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Login</title>
  <link rel="stylesheet" href="login2.css">
</head>
<body>
  <div class="bg-animation" id="bg"></div>

  <div class="container">
    <h2>ERP Login</h2>

    <div class="role-btns">
      <button id="studentBtn" class="active">Login as Student</button>
      <button id="instructorBtn">Login as Instructor</button>
    </div>

    <!-- Student Login Form -->
    <form id="studentForm" class="active">
      <label>Student ID</label>
      <input type="text" placeholder="Enter Student ID" required>
      
      <label>Email</label>
      <input type="email" placeholder="Enter Email" required>

      <label>Password</label>
      <input type="password" placeholder="Enter Password" required>
      
      <button type="submit" class="submit">Login</button>
      <div class="toggle" onclick="showRegister()">New Student? Register here</div>
    </form>

    <!-- Instructor Login Form -->
    <form id="instructorForm">
      <label>Instructor ID</label>
      <input type="text" placeholder="Enter Instructor ID" required>
      
      <label>Email</label>
      <input type="email" placeholder="Enter Email" required>

      <label>Password</label>
      <input type="password" placeholder="Enter Password" required>
      
      <button type="submit" class="submit">Login</button>
      <div class="toggle" onclick="showRegister()">New Instructor? Register here</div>
    </form>

    <!-- Registration Form -->
    <form id="registerForm">
      <label>Full Name</label>
      <input type="text" placeholder="Enter Full Name" required>
      
      <label>Email</label>
      <input type="email" placeholder="Enter Email" required>

      <label>Contact Number</label>
      <input type="tel" placeholder="Enter Contact Number" required>

      <label>Role</label>
      <select id="roleSelect" required onchange="toggleRegistrationFields()">
        <option value="">Select Role</option>
        <option value="student">Student</option>
        <option value="instructor">Instructor</option>
      </select>

      <!-- Student Specific Fields -->
      <div id="studentFields" style="display:none;">
        <label>Date of Birth</label>
        <input type="date" required>

        <label>Section</label>
        <input type="text" placeholder="Enter Section" required>

        <label>Course</label>
        <input type="text" placeholder="Enter Course" required>

        <label>College</label>
        <input type="text" placeholder="Enter College Name" required>
      </div>

      <!-- Instructor Specific Fields -->
      <div id="instructorFields" style="display:none;">
        <label>Subjects</label>
        <input type="text" placeholder="Enter Subjects You Teach" required>
      </div>

      <label>Create Password</label>
      <input type="password" placeholder="Enter Password" required>

      <button type="submit" class="submit">Register</button>
      <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
    </form>
  </div>

  <script src="login2.js"></script>
</body>
</html>
